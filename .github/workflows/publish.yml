name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  actions: write

jobs:
  # Job 1: Update the GitHub Repository Sidebar
  publish-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@earnwithalee7890'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build package
        run: npm run build

      - name: Publish to GitHub Packages
        run: |
          # 1. Rename to match EXACT repository name (Required for first-time GPR publish)
          sed -i 's/@earnwithalee\/stx-contract/@earnwithalee7890\/stxcontract-sdk/' package.json
          
          # 2. Explicitly link to this repository
          sed -i 's|"repository": {|"repository": { "url": "git+https://github.com/${{ github.repository }}.git",|' package.json
          
          # 3. Force authentication
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Update the Public NPM Registry
  publish-npm:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build package
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public --provenance
